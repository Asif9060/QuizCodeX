{% extends "base.html" %}
{% load static %}

{% block title %}Create Account{% endblock %}

{% block content %}
<div class="min-h-[calc(100vh-4rem)] flex items-center justify-center px-4 py-12">

  <div class="absolute inset-0 pointer-events-none overflow-hidden">
    <div class="absolute top-1/3 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[400px] bg-secondary/8 rounded-full blur-3xl"></div>
  </div>

  <div class="w-full max-w-sm relative animate-slide-up">

    <!-- Brand -->
    <div class="text-center mb-8">
      <a href="{% url 'core:home' %}" class="inline-flex items-center gap-2 mb-4">
        <div class="w-9 h-9 rounded-xl bg-primary/20 border border-primary/40 flex items-center justify-center">
          <span class="material-symbols-rounded text-primary text-lg">quiz</span>
        </div>
        <span class="font-bold text-xl">Dev<span class="text-gradient-primary">Quiz</span></span>
      </a>
      <h1 class="text-2xl font-extrabold mb-1">Create your account</h1>
      <p class="text-sm text-base-content/50">Free forever. No credit card required.</p>
    </div>

    <!-- Card -->
    <div class="card-quiz p-7">

      <!-- Tabs -->
      <div class="tabs tabs-boxed bg-base-300 border border-surface-border p-1 mb-6">
        <a href="{% url 'accounts:login' %}" class="tab text-base-content/50 hover:text-base-content flex-1">Sign in</a>
        <a href="{% url 'accounts:register' %}" class="tab tab-active bg-primary text-white rounded-lg flex-1">Register</a>
      </div>

      <form method="post" class="space-y-4">
        {% csrf_token %}

        <!-- Username -->
        <div>
          <label class="label py-1">
            <span class="label-text text-xs text-base-content/60 font-medium">Username</span>
          </label>
          <div class="relative">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 material-symbols-rounded text-base-content/40 text-sm">person</span>
            <input type="text" name="username" placeholder="Choose a username" required maxlength="30"
                   class="input input-bordered w-full pl-9 bg-base-300 border-surface-border focus:border-primary" />
          </div>
        </div>

        <!-- Email -->
        <div>
          <label class="label py-1">
            <span class="label-text text-xs text-base-content/60 font-medium">Email</span>
          </label>
          <div class="relative">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 material-symbols-rounded text-base-content/40 text-sm">mail</span>
            <input type="email" name="email" placeholder="you@example.com" required
                   class="input input-bordered w-full pl-9 bg-base-300 border-surface-border focus:border-primary" />
          </div>
        </div>

        <!-- Password -->
        <div x-data="{ show: false, strength: 0 }">
          <label class="label py-1">
            <span class="label-text text-xs text-base-content/60 font-medium">Password</span>
          </label>
          <div class="relative">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 material-symbols-rounded text-base-content/40 text-sm">lock</span>
            <input :type="show ? 'text' : 'password'" name="password1" placeholder="Create a strong password" required
                   @input="strength = $el.value.length > 12 ? 3 : $el.value.length > 8 ? 2 : $el.value.length > 4 ? 1 : 0"
                   class="input input-bordered w-full pl-9 pr-10 bg-base-300 border-surface-border focus:border-primary" />
            <button type="button" @click="show = !show"
                    class="absolute right-3 top-1/2 -translate-y-1/2 text-base-content/40 hover:text-base-content transition-colors">
              <span class="material-symbols-rounded text-sm" x-text="show ? 'visibility_off' : 'visibility'">visibility</span>
            </button>
          </div>
          <!-- Strength indicator -->
          <div class="flex gap-1 mt-1.5">
            <div class="h-1 flex-1 rounded-full transition-colors" :class="strength >= 1 ? 'bg-error' : 'bg-surface-border'"></div>
            <div class="h-1 flex-1 rounded-full transition-colors" :class="strength >= 2 ? 'bg-warning' : 'bg-surface-border'"></div>
            <div class="h-1 flex-1 rounded-full transition-colors" :class="strength >= 3 ? 'bg-success' : 'bg-surface-border'"></div>
          </div>
          <div class="text-xs mt-1 text-base-content/40"
               x-text="['', 'Weak', 'Medium', 'Strong'][strength] || 'Enter a password'"></div>
        </div>

        <!-- Confirm password -->
        <div>
          <label class="label py-1">
            <span class="label-text text-xs text-base-content/60 font-medium">Confirm Password</span>
          </label>
          <div class="relative">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 material-symbols-rounded text-base-content/40 text-sm">lock_reset</span>
            <input type="password" name="password2" placeholder="Repeat your password" required
                   class="input input-bordered w-full pl-9 bg-base-300 border-surface-border focus:border-primary" />
          </div>
        </div>

        <!-- Terms -->
        <div class="flex items-start gap-2">
          <input type="checkbox" name="terms" id="terms" required class="checkbox checkbox-primary checkbox-sm mt-0.5 shrink-0" />
          <label for="terms" class="text-xs text-base-content/50 cursor-pointer leading-relaxed">
            I agree to the <a href="#" class="text-primary hover:underline">Terms of Service</a> and <a href="#" class="text-primary hover:underline">Privacy Policy</a>
          </label>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn btn-primary w-full gap-2 mt-2">
          <span class="material-symbols-rounded text-sm">person_add</span>
          Create account
        </button>
      </form>

    </div>

    <p class="text-center text-sm text-base-content/40 mt-6">
      Already have an account?
      <a href="{% url 'accounts:login' %}" class="text-primary hover:underline font-medium">Sign in</a>
    </p>

  </div>
</div>
{% endblock %}
